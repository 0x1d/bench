services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flowpipe:
    build:
      context: .
      dockerfile: docker/flowpipe/Dockerfile
    ports:
      - "7103:7103"
    volumes:
      - ./flows:/flows

volumes:
  postgres_data: {}
