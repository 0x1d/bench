name: PR Check UI

on:
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/pr-check-ui.yml'

concurrency:
  group: pr-ui-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
