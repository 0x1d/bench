resources:
  schemas:
    - id: petstore-api
      label: Petstore API
      type: openapi
      source:
        path: ./workspace/rest/petstore.json
  filesystem:
    - id: workspace
      label: Workspace
      path: ./workspace
    - id: flows
      label: Flows
      path: ./workspace/flows
  databases:
    - id: main
      label: Main DB
      url: ${BENCH_DB_MAIN_URL}
      enabled: true
      default: true
  rest:
    - id: petstore
      label: Petstore API
      baseUrl: https://petstore.swagger.io/v2
      openapiSpec: ./workspace/rest/petstore.json
      auth:
        type: none
    - id: lmstudio
      label: LM Studio
      baseUrl: http://host.docker.internal:1234
      openapiSpec: ./workspace/rest/lmstudio.json
    - id: comfyui
      label: ComfyUI API
      baseUrl: http://host.docker.internal:3000
      openapiSpec: ./workspace/rest/comfyui.yaml
    - id: agent
      label: AI Agent
      baseUrl: http://agent:3001
      openapiSpec: ./workspace/rest/agent.yaml

flows:
  path: ./workspace/flows
  workspaces:
    - id: default
      label: Default
      flowpipeUrl: http://localhost:7103

infrastructure:
  path: ./workspace/infra

agent:
  endpoint: http://localhost:3001
  workingDirectory: /workspace
  agent: cursor

# Flowpipe triggers for automatic pipeline execution
flowpipe_triggers:
  - id: daily-report-webhook
    label: Daily Report Webhook
    flow: daily_report
    type: webhook
    config:
      description: "Trigger daily report via webhook"
      pipeline: pipeline.daily_report
  - id: hourly-check-schedule
    label: Hourly Check
    flow: hourly_check
    type: schedule
    config:
      description: "Run hourly checks"
      pipeline: pipeline.hourly_check
      schedule:
        cron: "0 * * * *"
        timezone: "UTC"
