# Resource roots for file browsing.
# Keep in sync with repo root config.example.yaml (embedded for deployed builds).
# Copy to config.yaml and adjust paths for your environment.
resources:
  schemas:
    - id: petstore-api
      label: Petstore API
      type: openapi
      source:
        path: ./workspace/rest/petstore.json
  filesystem:
    - id: default
      label: My Data
      path: /path/to/your/data
    - id: workflows
      label: Workflows
      path: /path/to/workflows
  databases:
    - id: main
      label: Main DB
      url: ${BENCH_DB_MAIN_URL}
      enabled: true
      default: true
  rest:
    - id: petstore
      label: Petstore API
      baseUrl: https://petstore.swagger.io/v2
      openapiSpec: specs/petstore.json
      auth:
        type: none

# Flows (Flowpipe integration)
flows:
  path: ./flows
  workspaces:
    - id: default
      label: Default
      flowpipeUrl: http://localhost:7103
