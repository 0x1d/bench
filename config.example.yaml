resources:
  filesystem:
    - id: workspace
      label: Workspace
      path: ./workspace
    - id: flows
      label: Flows
      path: ./workspace/flows
  databases:
    - id: main
      label: Main DB
      url: ${BENCH_DB_MAIN_URL}
      enabled: true
      default: true
  rest:
    - id: petstore
      label: Petstore API
      baseUrl: https://petstore.swagger.io/v2
      openapiSpec: ./workspace/rest/petstore.json
      auth:
        type: none
    - id: lmstudio
      label: LM Studio
      baseUrl: http://host.docker.internal:1234
      openapiSpec: ./workspace/rest/lmstudio.json
    - id: comfyui
      label: ComfyUI API
      baseUrl: http://host.docker.internal:3000
      openapiSpec: ./workspace/rest/comfyui.yaml

flows:
  path: ./workspace/flows
  workspaces:
    - id: default
      label: Default
      flowpipeUrl: http://localhost:7103
