services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flowpipe:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/flowpipe/Dockerfile
    ports:
      - "7103:7103"
    volumes:
      - ./workspace/flows:/flows
      - /var/run/docker.sock:/var/run/docker.sock

  agent:
    image: wirelos/cursor-service:latest
    user: "1000"
    env_file:
      - agent.env
    ports:
      - "3001:3001"
    volumes:
      - ./workspace:/workspace
      - /home/master/.gemini/:/home/ubuntu/.gemini/
    environment:
      - PORT=3001
      - AGENT=${AGENT:-cursor}
    stop_signal: SIGKILL
    tty: true

volumes:
  postgres_data: {}
